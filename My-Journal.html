<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Digital Sanctuary | Archive</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Source+Serif+4:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <style>
        body { background-color: #fcf9f8; font-family: 'Inter', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 200, 'GRAD' 0, 'opsz' 24; }
    </style>
</head>
<body class="bg-stone-50 text-stone-800 min-h-screen flex flex-col relative">

<div id="statusModal" class="fixed inset-0 z-50 flex items-center justify-center bg-stone-950/40 backdrop-blur-sm hidden">
    <div class="bg-[#fcf9f8] p-8 rounded border border-emerald-900/10 max-w-sm w-full mx-4 shadow-2xl text-center transform scale-95 transition-all duration-300">
        <div id="modalIconContainer" class="w-16 h-16 rounded-full mx-auto flex items-center justify-center mb-5 shadow-inner">
            <span id="modalIcon" class="material-symbols-outlined text-3xl">spa</span>
        </div>
        <h3 id="modalTitle" class="text-2xl font-serif font-medium text-emerald-900 mb-2">Sanctuary Status</h3>
        <p id="modalMessage" class="text-sm text-stone-600 mb-6 leading-relaxed font-sans px-2">Processing archive parameters...</p>
        
        <div id="modalActions" class="space-y-2">
            <button id="modalBtn" class="w-full bg-emerald-800 text-white text-sm py-3 px-4 rounded font-medium shadow-sm transition-all hover:bg-emerald-900 flex items-center justify-center gap-2">
                <span>Continue</span>
                <span class="material-symbols-outlined text-[18px]">east</span>
            </button>
            <button id="modalCancelBtn" class="w-full bg-stone-200 text-stone-700 text-sm py-2.5 px-4 rounded font-medium transition-all hover:bg-stone-300 hidden">
                Cancel
            </button>
        </div>
    </div>
</div>

    <nav class="border-b border-stone-200 py-4 bg-white">
        <div class="max-w-6xl mx-auto px-4 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <span class="material-symbols-outlined text-emerald-800 text-2xl">spa</span>
                <span class="font-serif text-lg font-semibold text-emerald-800">Digital Sanctuary</span>
            </div>
            <div class="flex gap-6 items-center">
                <a class="text-sm text-stone-600 hover:text-emerald-800" href="./Dashboard.html">Dashboard</a>
                <a class="text-sm text-stone-600 hover:text-emerald-800" href="./My-Journal.html">My Journal</a>
                <a class="text-sm bg-emerald-800 text-white px-4 py-2 rounded hover:bg-emerald-900 transition-all" href="./New-entry.html">Write Entry</a>
                <button id="logoutBtn" class="text-sm text-red-600 hover:underline ml-2">Log Out</button>
            </div>
        </div>
    </nav>
    <main class="flex-grow max-w-4xl w-full mx-auto px-4 py-12">
        <header class="mb-10 flex flex-col sm:flex-row justify-between items-start sm:items-end gap-4">
            <div>
                <p class="text-xs font-semibold text-emerald-800 uppercase tracking-widest mb-1">Archive Vault</p>
                <h1 class="text-3xl font-serif font-medium text-stone-900">My Reflections</h1>
            </div>
            <div class="w-full sm:w-64 relative">
                <input id="searchBar" class="w-full bg-white border border-stone-300 rounded px-3 py-1.5 text-sm focus:ring-1 focus:ring-emerald-800 focus:border-emerald-800" placeholder="Search entries..." type="text"/>
            </div>
        </header>
        <section class="space-y-6" id="journalStreamContainer">
            <div class="text-center py-12 bg-white rounded border border-dashed border-stone-300" id="emptyState">
                <p class="text-stone-500 mb-4">No reflections written yet.</p>
                <a class="bg-emerald-800 text-white px-4 py-2 rounded text-sm hover:bg-emerald-900" href="./New-entry.html">Open Canvas</a>
            </div>
        </section>
    </main>
    <script>
        // Grab elements needed to control the Pop-Up UI
        const modal = document.getElementById('statusModal');
        const modalIconContainer = document.getElementById('modalIconContainer');
        const modalIcon = document.getElementById('modalIcon');
        const modalTitle = document.getElementById('modalTitle');
        const modalMessage = document.getElementById('modalMessage');
        const modalBtn = document.getElementById('modalBtn');
        const modalCancelBtn = document.getElementById('modalCancelBtn');

        let postModalRedirectURL = null;
        let pendingConfirmAction = null;

        // Helper function to show custom stylized pop-up window
        function showModal(status, title, message, redirectURL = null, confirmAction = null) {
            postModalRedirectURL = redirectURL;
            pendingConfirmAction = confirmAction;
            
            // Hide cancel button by default
            modalCancelBtn.classList.add('hidden');
            
            if (status === 'success') {
                modalIconContainer.className = "w-16 h-16 rounded-full mx-auto flex items-center justify-center mb-5 shadow-inner bg-emerald-50 text-emerald-700";
                modalIcon.textContent = "done";
                modalBtn.className = "w-full bg-emerald-800 text-white text-sm py-3 px-4 rounded font-medium shadow-sm transition-all hover:bg-emerald-900 flex items-center justify-center gap-2";
                modalBtn.querySelector('span').textContent = "Continue";
            } else if (status === 'warning') {
                // Style for delete action confirmation
                modalIconContainer.className = "w-16 h-16 rounded-full mx-auto flex items-center justify-center mb-5 shadow-inner bg-red-50 text-red-700";
                modalIcon.textContent = "delete_forever";
                modalBtn.className = "w-full bg-red-700 text-white text-sm py-3 px-4 rounded font-medium shadow-sm transition-all hover:bg-red-800 flex items-center justify-center gap-2";
                modalBtn.querySelector('span').textContent = "Delete Permanently";
                modalCancelBtn.classList.remove('hidden');
            } else {
                modalIconContainer.className = "w-16 h-16 rounded-full mx-auto flex items-center justify-center mb-5 shadow-inner bg-red-50 text-red-700";
                modalIcon.textContent = "logout";
                modalBtn.className = "w-full bg-red-700 text-white text-sm py-3 px-4 rounded font-medium shadow-sm transition-all hover:bg-red-800 flex items-center justify-center gap-2";
                modalBtn.querySelector('span').textContent = "Continue";
            }

            modalTitle.textContent = title;
            modalMessage.textContent = message;
            modal.classList.remove('hidden');
        }

        // Handle Main button interaction click
        modalBtn.addEventListener('click', () => {
            modal.classList.add('hidden');
            
            if (pendingConfirmAction) {
                pendingConfirmAction();
                pendingConfirmAction = null;
            } else if (postModalRedirectURL) {
                window.location.href = postModalRedirectURL;
            }
        });

        // Cancel button interaction
        modalCancelBtn.addEventListener('click', () => {
            modal.classList.add('hidden');
            pendingConfirmAction = null;
        });

        // Security Gate Check
        if (localStorage.getItem('isLoggedIn') !== 'true') { window.location.href = './Login.html'; }
        
        const entries = JSON.parse(localStorage.getItem('journal_entries')) || [];
        const container = document.getElementById('journalStreamContainer');
        const searchBar = document.getElementById('searchBar');

        function displayEntries(list) {
            container.querySelectorAll('article').forEach(a => a.remove());
            const emptyState = document.getElementById('emptyState');
            if (emptyState) emptyState.style.display = list.length === 0 ? 'block' : 'none';

            list.forEach(entry => {
                const article = document.createElement('article');
                article.className = "bg-white p-6 rounded border border-stone-200 shadow-sm relative";
                article.innerHTML = `
                    <div class="flex justify-between items-start mb-2">
                        <div>
                            <span class="text-xs text-emerald-800 block">${entry.date}</span>
                            <h2 class="text-xl font-serif font-medium text-stone-900 mt-1">${entry.title}</h2>
                        </div>
                        <div class="flex gap-3">
                            <button onclick="editEntry(${entry.id})" class="text-stone-400 hover:text-emerald-800 text-sm" title="Edit Reflection">
                                <span class="material-symbols-outlined">edit</span>
                            </button>
                            <button onclick="deleteEntry(${entry.id})" class="text-stone-400 hover:text-red-600 text-sm" title="Delete Reflection">
                                <span class="material-symbols-outlined">delete</span>
                            </button>
                        </div>
                    </div>
                    <p class="text-stone-700 whitespace-pre-wrap leading-relaxed text-sm">${entry.content}</p>
                `;
                container.appendChild(article);
            });
        }

        searchBar.addEventListener('input', (e) => {
            const q = e.target.value.toLowerCase();
            const filtered = entries.filter(item => item.title.toLowerCase().includes(q) || item.content.toLowerCase().includes(q));
            displayEntries(filtered);
        });

        // Redirects to writing canvas with target parameter
        window.editEntry = function(id) {
            window.location.href = `./New-entry.html?edit=${id}`;
        };

        // Replaced browser confirmation with website-styled popup window modal
        window.deleteEntry = function(id) {
            showModal(
                'warning', 
                'Remove Reflection', 
                'Are you sure you want to delete this reflection? This process cannot be undone.', 
                null, 
                function() {
                    const updated = entries.filter(item => item.id !== id);
                    localStorage.setItem('journal_entries', JSON.stringify(updated));
                    window.location.reload();
                }
            );
        };

        // Modified Log Out to trigger layout matched custom modal overlay
        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('isLoggedIn');
            showModal('error', 'Session Ended', 'Your active sanctuary credentials have been safely cleared from current memory loops.', './Login.html');
        });

        displayEntries(entries);
    </script>
</body>
</html>
