<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Digital Sanctuary | Writing Canvas</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Source+Serif+4:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <style>
        body { background-color: #fcf9f8; font-family: 'Inter', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 200, 'GRAD' 0, 'opsz' 24; }
        textarea:focus, input:focus { outline: none !important; box-shadow: none !important; }
    </style>
</head>
<body class="bg-stone-50 text-stone-800 min-h-screen flex flex-col justify-between relative">

<div id="statusModal" class="fixed inset-0 z-50 flex items-center justify-center bg-stone-950/40 backdrop-blur-sm hidden">
    <div class="bg-[#fcf9f8] p-8 rounded border border-emerald-900/10 max-w-sm w-full mx-4 shadow-2xl text-center transform scale-95 transition-all duration-300">
        <div id="modalIconContainer" class="w-16 h-16 rounded-full mx-auto flex items-center justify-center mb-5 shadow-inner bg-emerald-50 text-emerald-700">
            <span id="modalIcon" class="material-symbols-outlined text-3xl">spa</span>
        </div>
        <h3 id="modalTitle" class="text-2xl font-serif font-medium text-emerald-900 mb-2">Sanctuary Status</h3>
        <p id="modalMessage" class="text-sm text-stone-600 mb-6 leading-relaxed font-sans px-2">Archiving reflection parameters...</p>
        <button id="modalBtn" class="w-full bg-emerald-800 text-white text-sm py-3 px-4 rounded font-medium shadow-sm transition-all hover:bg-emerald-900 flex items-center justify-center gap-2">
            <span>Continue</span>
            <span class="material-symbols-outlined text-[18px]">east</span>
        </button>
    </div>
</div>

<nav class="border-b border-stone-200 py-4 bg-white">
<div class="max-w-6xl mx-auto px-4 flex justify-between items-center">
    <div class="flex items-center gap-2">
        <span class="material-symbols-outlined text-emerald-800 text-2xl">spa</span>
        <span class="font-serif text-lg font-semibold text-emerald-800">Digital Sanctuary</span>
    </div>
    <div class="flex gap-6 items-center">
        <a class="text-sm text-stone-600 hover:text-emerald-800" href="./Dashboard.html">Dashboard</a>
        <a class="text-sm text-stone-600 hover:text-emerald-800" href="./My-Journal.html">My Journal</a>
        <a class="text-sm bg-emerald-800 text-white px-4 py-2 rounded hover:bg-emerald-900 transition-all" href="./New-entry.html">Write Entry</a>
    </div>
</div>
</nav>

<main class="flex-grow flex items-center justify-center py-12 px-6">
<div class="max-w-2xl w-full bg-white p-8 rounded border border-stone-200 shadow-sm">
<h2 id="pageModeHeader" class="text-xs font-semibold text-emerald-800 uppercase tracking-widest mb-4">New Reflection</h2>
<form id="entryForm" class="space-y-6">
<div><input id="entryTitle" class="w-full bg-transparent border-none p-0 text-2xl font-serif text-stone-900 placeholder-stone-300 focus:ring-0" placeholder="Title your reflection..." required="" type="text"/></div>
<div><textarea id="entryContent" class="w-full bg-transparent border-none p-0 text-sm text-stone-700 placeholder-stone-300 focus:ring-0 min-h-[250px] resize-none" placeholder="Begin writing..." required=""></textarea></div>
<div class="pt-6 border-t border-stone-200 flex justify-between items-center">
<a class="text-stone-500 text-sm hover:text-stone-800" href="./Dashboard.html">Abandon</a>
<button id="submitBtn" class="bg-emerald-800 text-white text-sm px-5 py-2 rounded hover:bg-emerald-900 transition-all" type="submit">Archive Entry</button>
</div>
</form>
</div>
</main>

<script>
    // Grab elements needed to control the Pop-Up UI
    const modal = document.getElementById('statusModal');
    const modalIconContainer = document.getElementById('modalIconContainer');
    const modalIcon = document.getElementById('modalIcon');
    const modalTitle = document.getElementById('modalTitle');
    const modalMessage = document.getElementById('modalMessage');
    const modalBtn = document.getElementById('modalBtn');

    let postModalRedirectURL = null;

    // Helper function to show custom stylized pop-up window
    function showModal(status, title, message, redirectURL = null) {
        postModalRedirectURL = redirectURL;
        
        if (status === 'success') {
            modalIconContainer.className = "w-16 h-16 rounded-full mx-auto flex items-center justify-center mb-5 shadow-inner bg-emerald-50 text-emerald-700";
            modalIcon.textContent = "done";
            modalBtn.className = "w-full bg-emerald-800 text-white text-sm py-3 px-4 rounded font-medium shadow-sm transition-all hover:bg-emerald-900 flex items-center justify-center gap-2";
        } else {
            modalIconContainer.className = "w-16 h-16 rounded-full mx-auto flex items-center justify-center mb-5 shadow-inner bg-red-50 text-red-700";
            modalIcon.textContent = "gpp_bad";
            modalBtn.className = "w-full bg-red-700 text-white text-sm py-3 px-4 rounded font-medium shadow-sm transition-all hover:bg-red-800 transition-colors flex items-center justify-center gap-2";
        }

        modalTitle.textContent = title;
        modalMessage.textContent = message;
        modal.classList.remove('hidden');
    }

    modalBtn.addEventListener('click', () => {
        modal.classList.add('hidden');
        if (postModalRedirectURL) {
            window.location.href = postModalRedirectURL;
        }
    });

    // Security Gate Check
    if (localStorage.getItem('isLoggedIn') !== 'true') { window.location.href = './Login.html'; }
    
    let entries = JSON.parse(localStorage.getItem('journal_entries')) || [];
    
    // Catch URL Parameters to determine if we are editing an entry
    const urlParams = new URLSearchParams(window.location.search);
    const editId = urlParams.get('edit');
    
    let isEditMode = false;
    let targetEntryIndex = -1;

    // If '?edit=ID' exists, prepare the edit environment
    if (editId) {
        targetEntryIndex = entries.findIndex(item => item.id == editId);
        if (targetEntryIndex !== -1) {
            isEditMode = true;
            document.getElementById('pageModeHeader').textContent = "Updating Reflection";
            document.getElementById('submitBtn').textContent = "Save Changes";
            document.getElementById('entryTitle').value = entries[targetEntryIndex].title;
            document.getElementById('entryContent').value = entries[targetEntryIndex].content;
        }
    }

    document.getElementById('entryForm').addEventListener('submit', function(event) {
        event.preventDefault();
        const title = document.getElementById('entryTitle').value.trim();
        const content = document.getElementById('entryContent').value.trim();
        
        if (isEditMode && targetEntryIndex !== -1) {
            // Update the existing item parameters
            entries[targetEntryIndex].title = title || "Untitled";
            entries[targetEntryIndex].content = content;
            
            localStorage.setItem('journal_entries', JSON.stringify(entries));
            
            // Show premium modal pop-up instead of generic browser alert
            showModal('success', 'Changes Saved', 'Your adjustments have been quietly recorded back to your archive loops.', './Dashboard.html');
        } else {
            // Build a completely new entry item packet
            const newEntry = {
                id: Date.now(),
                title: title || "Untitled",
                content: content,
                date: new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })
            };
            entries.unshift(newEntry);
            
            localStorage.setItem('journal_entries', JSON.stringify(entries));
            
            // Show premium modal pop-up instead of generic browser alert
            showModal('success', 'Reflection Archived', 'Your thoughts have been safely committed into your data container archive.', './Dashboard.html');
        }
    });
</script>
</body>
</html>
