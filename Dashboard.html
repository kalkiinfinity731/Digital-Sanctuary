<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Digital Sanctuary | Dashboard</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Source+Serif+4:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
        body { background-color: #fcf9f8; font-family: 'Inter', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 200, 'GRAD' 0, 'opsz' 24; }
    </style>
</head>
<body class="bg-stone-50 text-stone-800 min-h-screen flex flex-col">
    <nav class="border-b border-stone-200 py-4 bg-white">
        <div class="max-w-6xl mx-auto px-4 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <span class="material-symbols-outlined text-emerald-800 text-2xl">spa</span>
                <span class="font-serif text-lg font-semibold text-emerald-800">Digital Sanctuary</span>
            </div>
            <div class="flex gap-6 items-center">
                <a class="text-sm text-stone-600 hover:text-emerald-800" href="./Dashboard.html">Dashboard</a>
                <a class="text-sm text-stone-600 hover:text-emerald-800" href="./My-Journal.html">My Journal</a>
                <a class="text-sm bg-emerald-800 text-white px-4 py-2 rounded hover:bg-emerald-900 transition-all" href="./New-entry.html">Write Entry</a>
                <button id="logoutBtn" class="text-sm text-red-600 hover:underline ml-2">Log Out</button>
            </div>
        </div>
    </nav>
    <main class="flex-grow max-w-6xl w-full mx-auto px-4 py-12">
        <header class="mb-12">
            <p class="text-xs font-semibold text-emerald-800 uppercase tracking-widest mb-1">Welcome Back</p>
            <h1 class="text-4xl font-serif font-medium text-stone-900" id="userNameGreeting">Seeker</h1>
        </header>
        <section class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
            <div class="bg-white p-6 rounded border border-stone-200">
                <span class="material-symbols-outlined text-emerald-800 text-3xl mb-2">edit_note</span>
                <h3 class="text-xs text-stone-500 uppercase tracking-wider">Total Reflections</h3>
                <p class="text-3xl font-serif font-bold mt-1 text-stone-900" id="totalEntriesCount">0</p>
            </div>
            <div class="bg-white p-6 rounded border border-stone-200">
                <span class="material-symbols-outlined text-emerald-800 text-3xl mb-2">calendar_today</span>
                <h3 class="text-xs text-stone-500 uppercase tracking-wider">Sanctuary Status</h3>
                <p class="text-2xl font-serif font-medium mt-1 text-emerald-800">Secure</p>
            </div>
        </section>
        <section>
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-serif text-stone-900">Recent Reflections</h2>
                <a class="text-emerald-800 text-sm hover:underline flex items-center gap-1" href="./My-Journal.html">Archive &rarr;</a>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6" id="recentEntriesGrid">
                <div class="col-span-full text-center py-12 bg-white rounded border border-dashed border-stone-300" id="emptyState">
                    <p class="text-stone-500 mb-4">Your journal layout is currently empty.</p>
                    <a class="bg-emerald-800 text-white px-5 py-2 rounded text-sm hover:bg-emerald-900" href="./New-entry.html">Write Your First Reflection</a>
                </div>
            </div>
        </section>
    </main>
    <script>
        if (localStorage.getItem('isLoggedIn') !== 'true') { window.location.href = './Login.html'; }
        const savedUser = JSON.parse(localStorage.getItem('sanctuaryUser'));
        if (savedUser) { document.getElementById('userNameGreeting').textContent = savedUser.name; }
        
        const entries = JSON.parse(localStorage.getItem('journal_entries')) || [];
        document.getElementById('totalEntriesCount').textContent = entries.length;

        const gridContainer = document.getElementById('recentEntriesGrid');
        if (entries.length > 0) {
            const emptyState = document.getElementById('emptyState');
            if(emptyState) emptyState.remove();
            entries.slice(0, 2).forEach(entry => {
                const card = document.createElement('div');
                card.className = "bg-white p-6 rounded border border-stone-200 flex flex-col justify-between";
                card.innerHTML = `<div><span class="text-xs text-emerald-800 block mb-1">${entry.date}</span><h4 class="text-lg font-serif font-medium text-stone-900 mb-2">${entry.title}</h4><p class="text-sm text-stone-600 line-clamp-3 mb-4">${entry.content}</p></div><div class="text-right"><a href="./My-Journal.html" class="text-xs font-semibold text-emerald-800 hover:underline">Read More &rarr;</a></div>`;
                gridContainer.appendChild(card);
            });
        }
        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('isLoggedIn');
            window.location.href = './Login.html';
        });
    </script>
</body></html>
