<!DOCTYPE html>
<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Join Digital Sanctuary | Registration</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;0,8..60,600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
    body { background-color: #fcf9f8; font-family: 'Inter', sans-serif; }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 200, 'GRAD' 0, 'opsz' 24; }
    input:focus { outline: none; border-bottom-color: #406262 !important; }
</style>
</head>
<body class="bg-surface text-on-surface">
<main class="min-h-screen flex flex-col md:flex-row items-stretch">
<section class="relative w-full md:w-1/2 min-h-[400px] md:min-h-screen flex items-center justify-center overflow-hidden bg-emerald-950/10">
<div class="p-8 max-w-md text-center md:text-left">
<h1 class="font-serif text-4xl text-emerald-900 mb-4 font-semibold">Digital Sanctuary</h1>
<p class="text-stone-600 mb-8 leading-relaxed">A space for reflection. Leave the noise behind and begin your journey into intentional journaling.</p>
</div>
</section>
<section class="w-full md:w-1/2 flex flex-col items-center justify-center p-8 bg-stone-50">
<div class="w-full max-w-[400px]">
<header class="mb-12">
<h2 class="text-2xl font-serif text-stone-900 mb-2 font-medium">Create Your Space</h2>
<p class="text-sm text-stone-500">Join our community of intentional writers.</p>
</header>
<form class="space-y-8" id="registerForm">
<div class="relative"><label class="block text-xs uppercase tracking-wider text-stone-500 mb-1" for="name">Full Name</label><input class="w-full bg-transparent border-t-0 border-l-0 border-r-0 border-b border-stone-300 py-2 px-0 text-base focus:ring-0" id="name" required="" type="text" placeholder="Eleanor Rigby"/></div>
<div class="relative"><label class="block text-xs uppercase tracking-wider text-stone-500 mb-1" for="email">Email Address</label><input class="w-full bg-transparent border-t-0 border-l-0 border-r-0 border-b border-stone-300 py-2 px-0 text-base focus:ring-0" id="email" required="" type="email" placeholder="hello@example.com"/></div>
<div class="relative"><label class="block text-xs uppercase tracking-wider text-stone-500 mb-1" for="password">Secure Password</label><input class="w-full bg-transparent border-t-0 border-l-0 border-r-0 border-b border-stone-300 py-2 px-0 text-base focus:ring-0" id="password" required="" type="password" placeholder="••••••••"/></div>
<div class="pt-4"><button class="w-full bg-emerald-800 text-white py-3 px-6 rounded font-medium hover:bg-emerald-900 transition-all flex items-center justify-center gap-2" type="submit">Create Account <span class="material-symbols-outlined text-[20px]">arrow_forward</span></button></div>
</form>
<footer class="mt-12 pt-8 border-t border-stone-200 text-center"><p class="text-sm text-stone-500">Already have a sanctuary? <a class="text-emerald-700 font-semibold hover:underline" href="./Login.html">Log In</a></p></footer>
</div>
</section>
</main>
<script>
    document.getElementById('registerForm').addEventListener('submit', function(event) {
        event.preventDefault();
        const userData = {
            name: document.getElementById('name').value,
            email: document.getElementById('email').value,
            password: document.getElementById('password').value
        };
        localStorage.setItem('sanctuaryUser', JSON.stringify(userData));
        alert('Account created successfully! Redirecting to sign in.');
        window.location.href = './Login.html';
    });
</script>
</body></html>
