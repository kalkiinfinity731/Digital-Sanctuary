<!DOCTYPE html>
<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Digital Sanctuary | Log In</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60;500;0,8..60;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
    body { background-color: #fcf9f8; font-family: 'Inter', sans-serif; }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 200, 'GRAD' 0, 'opsz' 24; }
    input:focus { outline: none; border-bottom-color: #406262 !important; }
</style>
</head>
<body class="bg-surface text-on-surface relative min-h-screen">

<div id="statusModal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm hidden">
    <div class="bg-white p-8 rounded border border-stone-200 max-w-sm w-full mx-4 shadow-xl text-center transform scale-95 transition-all duration-300">
        <div id="modalIconContainer" class="w-16 h-16 rounded-full mx-auto flex items-center justify-center mb-4">
            <span id="modalIcon" class="material-symbols-outlined text-3xl">done</span>
        </div>
        <h3 id="modalTitle" class="text-xl font-serif font-semibold text-stone-900 mb-2">Status</h3>
        <p id="modalMessage" class="text-sm text-stone-600 mb-6 leading-relaxed">Message placeholder.</p>
        <button id="modalBtn" class="w-full bg-stone-800 text-white text-sm py-2 px-4 rounded font-medium transition-colors">
            Continue
        </button>
    </div>
</div>

<main class="min-h-screen flex flex-col md:flex-row items-stretch">
<section class="relative w-full md:w-1/2 min-h-[300px] md:min-h-screen flex items-center justify-center overflow-hidden bg-emerald-950/10">
<div class="p-8 max-w-md text-center md:text-left">
<h1 class="font-serif text-4xl text-emerald-900 mb-4 font-semibold">Return to Sanctuary</h1>
<p class="text-stone-600 mb-8 leading-relaxed">Open your personal digital chest. Reconnect with your stream of internal narrative without judgment.</p>
</div>
</section>
<section class="w-full md:w-1/2 flex flex-col items-center justify-center p-8 bg-stone-50">
<div class="w-full max-w-[400px]">
<header class="mb-12">
<h2 class="text-2xl font-serif text-stone-900 mb-2 font-medium">Welcome Back</h2>
<p class="text-sm text-stone-500">Settle back into your ritual of documentation.</p>
</header>
<form class="space-y-8" id="loginForm">
<div class="relative"><label class="block text-xs uppercase tracking-wider text-stone-500 mb-1" for="email">Email Address</label><input class="w-full bg-transparent border-t-0 border-l-0 border-r-0 border-b border-stone-300 py-2 px-0 text-base focus:ring-0" id="email" required="" type="email" placeholder="hello@example.com"/></div>
<div class="relative"><label class="block text-xs uppercase tracking-wider text-stone-500 mb-1" for="password">Security Key</label><input class="w-full bg-transparent border-t-0 border-l-0 border-r-0 border-b border-stone-300 py-2 px-0 text-base focus:ring-0" id="password" required="" type="password" placeholder="••••••••"/></div>
<div class="pt-4"><button class="w-full bg-emerald-800 text-white py-3 px-6 rounded font-medium hover:bg-emerald-900 transition-all flex items-center justify-center gap-2" type="submit">Enter Sanctuary <span class="material-symbols-outlined text-[20px]">lock_open</span></button></div>
</form>
<footer class="mt-12 pt-8 border-t border-stone-200 text-center"><p class="text-sm text-stone-500">New seeker? <a class="text-emerald-700 font-semibold hover:underline" href="./Register.html">Create a Space</a></p></footer>
</div>
</section>
</main>

<script>
    // Grab elements needed to control the Pop-Up UI
    const modal = document.getElementById('statusModal');
    const modalIconContainer = document.getElementById('modalIconContainer');
    const modalIcon = document.getElementById('modalIcon');
    const modalTitle = document.getElementById('modalTitle');
    const modalMessage = document.getElementById('modalMessage');
    const modalBtn = document.getElementById('modalBtn');

    let postModalRedirectURL = null;

    // Helper function to show custom stylized pop-up window
    function showModal(status, title, message, redirectURL = null) {
        postModalRedirectURL = redirectURL;
        
        // Reset and style based on status state
        if (status === 'success') {
            modalIconContainer.className = "w-16 h-16 rounded-full mx-auto flex items-center justify-center mb-4 bg-emerald-50 text-emerald-700";
            modalIcon.textContent = "done";
            modalBtn.className = "w-full bg-emerald-800 text-white text-sm py-2 px-4 rounded font-medium hover:bg-emerald-900 transition-colors";
        } else {
            modalIconContainer.className = "w-16 h-16 rounded-full mx-auto flex items-center justify-center mb-4 bg-red-50 text-red-700";
            modalIcon.textContent = "gpp_bad";
            modalBtn.className = "w-full bg-red-700 text-white text-sm py-2 px-4 rounded font-medium hover:bg-red-800 transition-colors";
        }

        modalTitle.textContent = title;
        modalMessage.textContent = message;
        
        // Make modal visible
        modal.classList.remove('hidden');
    }

    // Modal action click event logic
    modalBtn.addEventListener('click', () => {
        modal.classList.add('hidden');
        if (postModalRedirectURL) {
            window.location.href = postModalRedirectURL;
        }
    });

    // Handle Login authentication routine with pop-up output windows
    document.getElementById('loginForm').addEventListener('submit', function(event) {
        event.preventDefault();
        const emailInput = document.getElementById('email').value.trim();
        const passwordInput = document.getElementById('password').value.trim();
        const savedUser = JSON.parse(localStorage.getItem('sanctuaryUser'));

        if (!savedUser) {
            showModal('error', 'Access Denied', 'No registered account found on this machine asset data pool.', './Register.html');
            return;
        }

        if (emailInput === savedUser.email && passwordInput === savedUser.password) {
            localStorage.setItem('isLoggedIn', 'true');
            showModal('success', 'Access Granted', 'Welcome back to your safe space. Loading reflection matrix stream...', './Dashboard.html');
        } else {
            showModal('error', 'Access Denied', 'The email or security key parameters are incorrect. Reflection entry denied.');
        }
    });
</script>
</body></html>
